<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon-512.png" />
    <link rel="apple-touch-icon" href="/favicon-512.png" />
    <title>VimDocs</title>
  </head>
  <body>
    <div id="app">
      <div id="setup-guide" class="overlay" style="display:none"></div>
      <div id="sign-in-overlay" class="overlay" style="display:none"></div>

      <div id="main-app" style="display:none">
        <aside id="sidebar">
          <div id="sidebar-header">
            <h1>VimDocs</h1>
            <button id="sidebar-toggle" title="Collapse sidebar">◀</button>
          </div>
          <div id="breadcrumbs"></div>
          <div id="sidebar-actions">
            <button id="new-file-btn">+ New File</button>
          </div>
          <div id="file-list"></div>
          <div id="sidebar-footer">
            <button id="vimrc-btn" title="Edit .vimrc">⚙ .vimrc</button>
            <button id="sign-out-btn">Sign Out</button>
          </div>
        </aside>

        <main id="editor-container">
          <button id="sidebar-expand" title="Expand sidebar" style="display:none">▶</button>
          <canvas id="vim-canvas"></canvas>
          <input id="vim-input" autocomplete="off" autofocus />
          <div id="status-bar">
            <span id="status-file"></span>
            <span id="status-save"></span>
            <span id="status-user"></span>
          </div>
        </main>
      </div>

      <div id="vimrc-modal" class="overlay" style="display:none">
        <div class="modal">
          <div class="modal-header">
            <h2>.vimrc Settings</h2>
            <button id="vimrc-close">✕</button>
          </div>
          <textarea id="vimrc-editor" spellcheck="false"></textarea>
          <div class="modal-footer">
            <p class="hint">Changes apply on next Vim restart.</p>
            <button id="vimrc-save">Save &amp; Restart Vim</button>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
